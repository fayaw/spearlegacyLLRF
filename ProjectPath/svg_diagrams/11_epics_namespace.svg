<?xml version='1.0' encoding='utf-8'?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <title>EPICS PV Namespace Map</title>
  <rect width="1400" height="1000" fill="white" />
  <text x="700" y="30" font-family="Arial" font-size="24" fill="black" text-anchor="middle">EPICS PV Namespace Map</text>
  <text x="700" y="60" font-family="Arial" font-size="16" fill="#666" text-anchor="middle">7 Major PV Prefix Groups</text>
  <rect x="100" y="120" width="300" height="120" fill="#e1f5fe" stroke="black" stroke-width="2" rx="5" />
  <text x="110" y="140" font-family="Arial" font-size="16" fill="black" text-anchor="start">LLRF1:</text>
  <text x="110" y="160" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Unit 1 - Field Control</text>
  <text x="115" y="185" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Field Control</text>
  <text x="115" y="200" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Tuner Phase</text>
  <text x="115" y="215" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Vector Sum</text>
  <text x="115" y="230" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Waveforms</text>
  <rect x="450" y="120" width="300" height="120" fill="#e8f5e8" stroke="black" stroke-width="2" rx="5" />
  <text x="460" y="140" font-family="Arial" font-size="16" fill="black" text-anchor="start">LLRF2:</text>
  <text x="460" y="160" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Unit 2 - Monitoring</text>
  <text x="465" y="185" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Monitoring</text>
  <text x="465" y="200" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Reflected Power</text>
  <text x="465" y="215" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Interlocks</text>
  <rect x="800" y="120" width="300" height="120" fill="#fff3e0" stroke="black" stroke-width="2" rx="5" />
  <text x="810" y="140" font-family="Arial" font-size="16" fill="black" text-anchor="start">SRF1:HVPS:</text>
  <text x="810" y="160" font-family="Arial" font-size="12" fill="#333" text-anchor="start">High Voltage Power Supply</text>
  <text x="815" y="185" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Voltage Setpoint/Readback</text>
  <text x="815" y="200" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Contactor Control</text>
  <text x="815" y="215" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Interlock Status</text>
  <text x="815" y="230" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Temperature</text>
  <rect x="100" y="280" width="300" height="120" fill="#fce4ec" stroke="black" stroke-width="2" rx="5" />
  <text x="110" y="300" font-family="Arial" font-size="16" fill="black" text-anchor="start">SRF1:MPS:</text>
  <text x="110" y="320" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Machine Protection System</text>
  <text x="115" y="345" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Permit Status</text>
  <text x="115" y="360" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Fault Active</text>
  <text x="115" y="375" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• First-Fault ID</text>
  <text x="115" y="390" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Event Count</text>
  <rect x="450" y="280" width="300" height="120" fill="#f3e5f5" stroke="black" stroke-width="2" rx="5" />
  <text x="460" y="300" font-family="Arial" font-size="16" fill="black" text-anchor="start">SRF1:MTR:</text>
  <text x="460" y="320" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Motor/Tuner Control</text>
  <text x="465" y="345" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Motor Position</text>
  <text x="465" y="360" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Tuner Steps</text>
  <text x="465" y="375" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Potentiometer</text>
  <rect x="800" y="280" width="300" height="120" fill="#e0f2f1" stroke="black" stroke-width="2" rx="5" />
  <text x="810" y="300" font-family="Arial" font-size="16" fill="black" text-anchor="start">SRF1:WFBUF:</text>
  <text x="810" y="320" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Waveform Buffer</text>
  <text x="815" y="345" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• RF Waveforms</text>
  <text x="815" y="360" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• HVPS Channels</text>
  <text x="815" y="375" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Comparator Thresholds</text>
  <text x="815" y="390" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Collector Power</text>
  <rect x="275" y="440" width="300" height="120" fill="#fff8e1" stroke="black" stroke-width="2" rx="5" />
  <text x="285" y="460" font-family="Arial" font-size="16" fill="black" text-anchor="start">SRF1:HTR:</text>
  <text x="285" y="480" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Heater Controller</text>
  <text x="290" y="505" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Heater Voltage</text>
  <text x="290" y="520" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Current RMS</text>
  <text x="290" y="535" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Warm-up Sequence</text>
  <text x="290" y="550" font-family="Arial" font-size="10" fill="#666" text-anchor="start">• Ready Status</text>
  <text x="700" y="650" font-family="Arial" font-size="18" fill="black" text-anchor="middle">PV Namespace Organization</text>
  <text x="700" y="680" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">• LLRF1/LLRF2: Direct LLRF9 controller interfaces</text>
  <text x="700" y="705" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">• SRF1:HVPS: High voltage power supply control and monitoring</text>
  <text x="700" y="730" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">• SRF1:MPS: Machine protection system status and faults</text>
  <text x="700" y="755" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">• SRF1:MTR: Galil motion controller for cavity tuning</text>
  <text x="700" y="780" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">• SRF1:WFBUF: Waveform buffer system for diagnostics</text>
  <text x="700" y="805" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">• SRF1:HTR: Klystron cathode heater control</text>
</svg>