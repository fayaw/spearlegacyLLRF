<?xml version='1.0' encoding='utf-8'?>
<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800">
  <title>Risk Assessment</title>
  <rect width="1000" height="800" fill="white" />
  <text x="500" y="30" font-family="Arial" font-size="24" fill="black" text-anchor="middle">Key Technical Risks</text>
  <text x="500" y="60" font-family="Arial" font-size="16" fill="#666" text-anchor="middle">Impact vs Likelihood Assessment</text>
  <line x1="100" y1="400" x2="900" y2="400" stroke="black" stroke-width="2" />
  <line x1="500" y1="100" x2="500" y2="700" stroke="black" stroke-width="2" />
  <text x="500" y="90" font-family="Arial" font-size="14" fill="black" text-anchor="middle">High Impact</text>
  <text x="500" y="720" font-family="Arial" font-size="14" fill="black" text-anchor="middle">Low Impact</text>
  <text x="80" y="405" font-family="Arial" font-size="14" fill="black" text-anchor="middle">Low Likelihood</text>
  <text x="920" y="405" font-family="Arial" font-size="14" fill="black" text-anchor="middle">High Likelihood</text>
  <text x="300" y="120" font-family="Arial" font-size="16" fill="#666" text-anchor="middle">Monitor</text>
  <text x="700" y="120" font-family="Arial" font-size="16" fill="#cc0000" text-anchor="middle">Mitigate</text>
  <text x="300" y="680" font-family="Arial" font-size="16" fill="#006600" text-anchor="middle">Accept</text>
  <text x="700" y="680" font-family="Arial" font-size="16" fill="#ff6600" text-anchor="middle">Contingency</text>
  <circle cx="750" cy="150" r="25" fill="#cc0000" stroke="black" stroke-width="2" />
  <text x="750" y="195" font-family="Arial" font-size="10" fill="black" text-anchor="middle">Python/EPICS
Coordinator</text>
  <circle cx="650" cy="200" r="20" fill="#ff6600" stroke="black" stroke-width="2" />
  <text x="650" y="240" font-family="Arial" font-size="10" fill="black" text-anchor="middle">Interface Chassis
Logic</text>
  <circle cx="720" cy="250" r="18" fill="#ff6600" stroke="black" stroke-width="2" />
  <text x="720" y="288" font-family="Arial" font-size="10" fill="black" text-anchor="middle">PPS Approval
Delays</text>
  <circle cx="600" cy="300" r="16" fill="#ff6600" stroke="black" stroke-width="2" />
  <text x="600" y="336" font-family="Arial" font-size="10" fill="black" text-anchor="middle">Tuner Motor
Reliability</text>
  <circle cx="550" cy="350" r="14" fill="#ffcc00" stroke="black" stroke-width="2" />
  <text x="550" y="384" font-family="Arial" font-size="10" fill="black" text-anchor="middle">HVPS PLC Code
Migration</text>
  <circle cx="650" cy="380" r="14" fill="#ffcc00" stroke="black" stroke-width="2" />
  <text x="650" y="414" font-family="Arial" font-size="10" fill="black" text-anchor="middle">Kly MPS PLC
Integration</text>
</svg>