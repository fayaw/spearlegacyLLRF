<?xml version='1.0' encoding='utf-8'?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <title>SPEAR3 LLRF System Architecture</title>
  <rect width="1400" height="1000" fill="white" />
  <text x="700" y="30" font-family="Arial" font-size="24" fill="black" text-anchor="middle">System Architecture — 10 Subsystems</text>
  <rect x="50" y="80" width="250" height="80" fill="#dae8fc" stroke="black" stroke-width="2" rx="5" />
  <text x="60" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="start">LLRF9 Controller</text>
  <text x="60" y="120" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Dimtel LLRF9/476</text>
  <text x="60" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="start">2 active + 2 spares</text>
  <rect x="350" y="80" width="250" height="80" fill="#fff2cc" stroke="black" stroke-width="2" rx="5" />
  <text x="360" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="start">HVPS Controller</text>
  <text x="360" y="120" font-family="Arial" font-size="11" fill="#333" text-anchor="start">CompactLogix PLC</text>
  <text x="360" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Replacing SLC-500</text>
  <rect x="650" y="80" width="250" height="80" fill="#fce4ec" stroke="black" stroke-width="2" rx="5" />
  <text x="660" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="start">Klystron MPS</text>
  <text x="660" y="120" font-family="Arial" font-size="11" fill="#333" text-anchor="start">ControlLogix 1756</text>
  <text x="660" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Hardware assembled</text>
  <rect x="950" y="80" width="250" height="80" fill="#fff2cc" stroke="black" stroke-width="2" rx="5" />
  <text x="960" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="start">Interface Chassis</text>
  <text x="960" y="120" font-family="Arial" font-size="11" fill="#333" text-anchor="start">NEW subsystem</text>
  <text x="960" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Central interlock hub</text>
  <rect x="1200" y="80" width="180" height="80" fill="#ffe6cc" stroke="black" stroke-width="2" rx="5" />
  <text x="1210" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="start">PPS Interface Box</text>
  <text x="1210" y="120" font-family="Arial" font-size="11" fill="#333" text-anchor="start">NEW subsystem</text>
  <text x="1210" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Safety approval needed</text>
  <rect x="50" y="200" width="250" height="80" fill="#e8f5e8" stroke="black" stroke-width="2" rx="5" />
  <text x="60" y="220" font-family="Arial" font-size="14" fill="black" text-anchor="start">Tuner Control</text>
  <text x="60" y="240" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Galil DMC-4143</text>
  <text x="60" y="255" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Motion controller</text>
  <rect x="350" y="200" width="250" height="80" fill="#f3e5f5" stroke="black" stroke-width="2" rx="5" />
  <text x="360" y="220" font-family="Arial" font-size="14" fill="black" text-anchor="start">Waveform Buffer</text>
  <text x="360" y="240" font-family="Arial" font-size="11" fill="#333" text-anchor="start">NEW subsystem</text>
  <text x="360" y="255" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Design complete</text>
  <rect x="650" y="200" width="250" height="80" fill="#ffebee" stroke="black" stroke-width="2" rx="5" />
  <text x="660" y="220" font-family="Arial" font-size="14" fill="black" text-anchor="start">Arc Detection</text>
  <text x="660" y="240" font-family="Arial" font-size="11" fill="#333" text-anchor="start">NEW subsystem</text>
  <text x="660" y="255" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Microstep-MIS sensors</text>
  <rect x="950" y="200" width="250" height="80" fill="#e0f2f1" stroke="black" stroke-width="2" rx="5" />
  <text x="960" y="220" font-family="Arial" font-size="14" fill="black" text-anchor="start">Cathode Heater</text>
  <text x="960" y="240" font-family="Arial" font-size="11" fill="#333" text-anchor="start">SCR-based</text>
  <text x="960" y="255" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Replacing variac</text>
  <rect x="1200" y="200" width="180" height="80" fill="#fff2cc" stroke="black" stroke-width="2" rx="5" />
  <text x="1210" y="220" font-family="Arial" font-size="14" fill="black" text-anchor="start">Control Software</text>
  <text x="1210" y="240" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Python/EPICS</text>
  <text x="1210" y="255" font-family="Arial" font-size="11" fill="#333" text-anchor="start">Coordinator</text>
  <line x1="300" y1="120" x2="350" y2="120" stroke="#666" stroke-width="2" />
  <polygon points="350,120 342.0,116.0 342.0,124.0" fill="#666" stroke="#666" />
  <line x1="600" y1="120" x2="650" y2="120" stroke="#666" stroke-width="2" />
  <polygon points="650,120 642.0,116.0 642.0,124.0" fill="#666" stroke="#666" />
  <line x1="900" y1="120" x2="950" y2="120" stroke="#666" stroke-width="2" />
  <polygon points="950,120 942.0,116.0 942.0,124.0" fill="#666" stroke="#666" />
  <line x1="1200" y1="120" x2="1200" y2="200" stroke="#666" stroke-width="2" />
  <polygon points="1200,200 1204.0,192.0 1196.0,192.0" fill="#666" stroke="#666" />
  <line x1="300" y1="240" x2="350" y2="240" stroke="#666" stroke-width="2" />
  <polygon points="350,240 342.0,236.0 342.0,244.0" fill="#666" stroke="#666" />
  <line x1="600" y1="240" x2="650" y2="240" stroke="#666" stroke-width="2" />
  <polygon points="650,240 642.0,236.0 642.0,244.0" fill="#666" stroke="#666" />
</svg>