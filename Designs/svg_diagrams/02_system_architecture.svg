<?xml version='1.0' encoding='utf-8'?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <title>SPEAR3 LLRF System Architecture</title>
  <rect width="1400" height="1000" fill="white" />
  <text x="700" y="30" font-family="Arial" font-size="20" fill="black">System Architecture — 10 Subsystems</text>
  <rect x="50" y="80" width="300" height="100" fill="#f0f0f0" stroke="black" stroke-width="2" />
  <text x="60" y="105" font-family="Arial" font-size="16" fill="black">Operator Layer</text>
  <rect x="400" y="80" width="350" height="100" fill="#dae8fc" stroke="black" stroke-width="2" />
  <text x="410" y="105" font-family="Arial" font-size="16" fill="black">Control Software</text>
  <rect x="800" y="80" width="550" height="200" fill="#e8f5e8" stroke="black" stroke-width="2" />
  <text x="810" y="105" font-family="Arial" font-size="16" fill="black">EPICS Network</text>
  <rect x="50" y="220" width="300" height="80" fill="#fff2cc" stroke="black" stroke-width="2" />
  <text x="60" y="245" font-family="Arial" font-size="16" fill="black">Hardware Interlock</text>
  <rect x="400" y="220" width="200" height="80" fill="#ffe6cc" stroke="black" stroke-width="2" />
