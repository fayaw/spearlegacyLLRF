<?xml version='1.0' encoding='utf-8'?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <title>Protection Chain Architecture</title>
  <rect width="1200" height="800" fill="white" />
  <text x="600" y="40" font-family="Arial" font-size="24" fill="black" text-anchor="middle">Protection Chain Architecture — Four Layers</text>
  <rect x="100" y="100" width="1000" height="80" fill="#ffcccc" stroke="black" stroke-width="2" rx="5" />
  <text x="120" y="125" font-family="Arial" font-size="16" fill="black" text-anchor="start">Layer 1: LLRF9 FPGA</text>
  <text x="120" y="145" font-family="Arial" font-size="14" fill="#666" text-anchor="start">&lt; 1 μs response</text>
  <text x="120" y="165" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Hardware-based RF protection</text>
  <rect x="100" y="220" width="1000" height="80" fill="#fff2cc" stroke="black" stroke-width="2" rx="5" />
  <text x="120" y="245" font-family="Arial" font-size="16" fill="black" text-anchor="start">Layer 2: Interface Chassis</text>
  <text x="120" y="265" font-family="Arial" font-size="14" fill="#666" text-anchor="start">&lt; 1 μs response</text>
  <text x="120" y="285" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Central interlock hub</text>
  <rect x="100" y="340" width="1000" height="80" fill="#dae8fc" stroke="black" stroke-width="2" rx="5" />
  <text x="120" y="365" font-family="Arial" font-size="16" fill="black" text-anchor="start">Layer 3: Kly MPS PLC</text>
  <text x="120" y="385" font-family="Arial" font-size="14" fill="#666" text-anchor="start">~ms response</text>
  <text x="120" y="405" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Machine protection system</text>
  <rect x="100" y="460" width="1000" height="80" fill="#d5e8d4" stroke="black" stroke-width="2" rx="5" />
  <text x="120" y="485" font-family="Arial" font-size="16" fill="black" text-anchor="start">Layer 4: Python Coordinator</text>
  <text x="120" y="505" font-family="Arial" font-size="14" fill="#666" text-anchor="start">~1 Hz response</text>
  <text x="120" y="525" font-family="Arial" font-size="12" fill="#333" text-anchor="start">Software supervision</text>
  <line x1="600" y1="180" x2="600" y2="220" stroke="#cc0000" stroke-width="3" />
  <polygon points="600,220 604.0,212.0 596.0,212.0" fill="#cc0000" stroke="#cc0000" />
  <line x1="600" y1="300" x2="600" y2="340" stroke="#cc0000" stroke-width="3" />
  <polygon points="600,340 604.0,332.0 596.0,332.0" fill="#cc0000" stroke="#cc0000" />
  <line x1="600" y1="420" x2="600" y2="460" stroke="#cc0000" stroke-width="3" />
  <polygon points="600,460 604.0,452.0 596.0,452.0" fill="#cc0000" stroke="#cc0000" />
</svg>